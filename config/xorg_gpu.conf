Section "ServerFlags"
    Option "AutoAddDevices" "False"
    Option "AllowEmptyInput" "True"
    Option "DontVTSwitch" "True"
EndSection

Section "Device"
    Identifier  "VideoCore6"
    Driver      "modesetting"
    Option      "kmsdev" "/dev/dri/card1"
    Option      "DRI" "3"
EndSection

Section "Monitor"
    Identifier  "Monitor0"
    Option      "Enable" "True"
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "VideoCore6"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1920x1080"
        Virtual 1920 1080
    EndSubSection
EndSection